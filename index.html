<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulse Social</title>
    <meta name="description" content="The all-in-one social media content management platform — submit content, track approvals, and manage the publishing calendar across all locations." />
    <meta name="theme-color" content="#4f46e5" />

    <!-- Google Search Console verification — set VITE_GSC_VERIFICATION in Vercel env vars -->
    <meta name="google-site-verification" content="%VITE_GSC_VERIFICATION%" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="Pulse Social" />
    <meta property="og:title" content="Pulse Social" />
    <meta property="og:description" content="Social media content submission, approval, and scheduling — built by Found First." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://asbury-social-staging.vercel.app/" />
    <meta property="og:image" content="https://asbury-social-staging.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Pulse Social — social media management platform by Found First" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pulse Social" />
    <meta name="twitter:description" content="Social media content submission, approval, and scheduling — built by Found First." />
    <meta name="twitter:image" content="https://asbury-social-staging.vercel.app/og-image.png" />
    <meta name="twitter:image:alt" content="Pulse Social" />

    <!-- GA4 initialized via src/lib/analytics.js using import.meta.env.VITE_GA4_ID -->

<script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body class="bg-slate-50">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
